version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: database_mongo
    ports:
      - "27017:27017"
    volumes:
      - dati_mongo:/data/db

  auth_api:
    build: ./servizioAutenticazione
    container_name: api_login
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

volumes:
  dati_mongo: