version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: database_mongo
    ports:
      - "27017:27017"
    volumes:
      - dati_mongo:/data/db

  auth_api:
    build: ./JWT_Generator
    container_name: api_login
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  servizio-metadati:
    build: ./Get_Images
    container_name: server_metadati
    ports:
      # Mappiamo la porta 5001 del tuo PC (sinistra) sulla porta 5001 del container (destra)
      - "5001:5001"
    volumes:
      - ./Get_Images/immagini_server:/app/immagini_server
    environment:
      # Passare la chiave segreta da qui è una best practice per la sicurezza
      - SECRET_KEY=segreto_123


volumes:
  dati_mongo:

#docker-compose up -d --build